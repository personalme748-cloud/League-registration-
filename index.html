<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Godstime Tournament</title>
<style>
body { font-family: Arial; background:#0d1117; color:white; text-align:center; }
.container { max-width:600px; margin:auto; background:#161b22; padding:20px; border-radius:10px; }
input, select { width:100%; padding:10px; margin:8px 0; border-radius:5px; border:none; }
button { padding:10px; margin:5px; border:none; border-radius:5px; cursor:pointer; }
#registration, #admin { display:none; }
table { width:100%; margin-top:20px; border-collapse:collapse; }
th, td { border:1px solid #58a6ff; padding:8px; }
th { background:#238636; }
tr:hover { background:#1f6feb; }
option:disabled { background:#555; color:#aaa; }
</style>
</head>
<body>

<h1>⚽ Godstime Tournament</h1>

<button id="btnRegister">Register</button>
<button id="btnAdmin">Admin</button>

<div id="registration" class="container">
<form id="regForm">
<input type="text" id="name" placeholder="Name" required>
<input type="email" id="email" placeholder="Email" required>
<select id="country">
<option>Nigeria</option>
<option>South Africa</option>
<option>Uganda</option>
<option>Tanzania</option>
<option>Kenya</option>
<option>Ghana</option>
</select>
<input type="text" id="phone" placeholder="Phone" value="+234" required>
<select id="team">
<option value="Chelsea">Chelsea</option>
<option value="Man U">Man U</option>
<option value="Man City">Man City</option>
<option value="Liverpool">Liverpool</option>
<option value="PSG">PSG</option>
<option value="AC Milan">AC Milan</option>
<option value="Real Madrid">Real Madrid</option>
<option value="Barcelona">Barcelona</option>
<option value="Arsenal">Arsenal</option>
<option value="Dortmund">Dortmund</option>
<option value="Nigeria">Nigeria</option>
<option value="South Africa">South Africa</option>
<option value="Uganda">Uganda</option>
<option value="Tanzania">Tanzania</option>
<option value="Kenya">Kenya</option>
<option value="Ghana">Ghana</option>
</select>
<button type="submit">Register</button>
</form>
</div>

<div id="admin" class="container">
<h2>Registered Users</h2>
<table>
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Email</th>
<th>Country</th>
<th>Team</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<script>
const btnRegister = document.getElementById("btnRegister");
const btnAdmin = document.getElementById("btnAdmin");
const regForm = document.getElementById("regForm");
const tableBody = document.getElementById("table");
const teamSelect = document.getElementById("team");

// Load registrations from localStorage
let registrations = JSON.parse(localStorage.getItem("registrations")) || [];

function updateTeamOptions() {
  const takenTeams = registrations.map(r => r.team);
  Array.from(teamSelect.options).forEach(opt => {
    opt.disabled = takenTeams.includes(opt.value);
  });
}

function show(id){
  document.getElementById("registration").style.display="none";
  document.getElementById("admin").style.display="none";
  document.getElementById(id).style.display="block";
  if(id==="admin") loadAdmin();
}

btnRegister.addEventListener("click", ()=>{
  updateTeamOptions();
  show("registration");
});

btnAdmin.addEventListener("click", ()=>{
  let u = prompt("Username");
  let p = prompt("Password");
  if(u==="GT0021" && p==="Godstime@1"){
    show("admin");
  }else{
    alert("Wrong login");
  }
});

function loadAdmin(){
  tableBody.innerHTML="";
  registrations.forEach((r,i)=>{
    tableBody.innerHTML += `
      <tr>
        <td>#${i+1}</td>
        <td>${r.name}</td>
        <td>${r.email}</td>
        <td>${r.country}</td>
        <td>${r.team}</td>
      </tr>
    `;
  });
}

regForm.addEventListener("submit", (e)=>{
  e.preventDefault();
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const country = document.getElementById("country").value;
  const phone = document.getElementById("phone").value;
  const team = document.getElementById("team").value;

  // Prevent selecting same team
  if(registrations.some(r=>r.team===team)){
    alert("❌ This team is already taken!");
    return;
  }

  // WhatsApp link
  const message = `Name: ${name}%0AEmail: ${email}%0ACountry: ${country}%0APhone: ${phone}%0ATeam: ${team}`;
  const waLink = `https://wa.me/2349079820557?text=${message}`;
  window.open(waLink, "_blank");

  // Save locally
  registrations.push({name,email,country,phone,team});
  localStorage.setItem("registrations", JSON.stringify(registrations));

  regForm.reset();
  updateTeamOptions();
});
</script>

</body>
</html>
