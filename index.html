<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Godstime Tournament</title>
<style>
body { font-family: Arial; background:#0d1117; color:white; text-align:center; }
.container { max-width:600px; margin:auto; background:#161b22; padding:20px; border-radius:10px; }
input, select { width:100%; padding:10px; margin:8px 0; border-radius:5px; border:none; }
button { padding:10px; margin:5px; border:none; border-radius:5px; cursor:pointer; }
#registration, #admin { display:none; }
table { width:100%; margin-top:20px; border-collapse:collapse; }
th, td { border:1px solid #58a6ff; padding:8px; }
th { background:#238636; }
tr:hover { background:#1f6feb; }
option:disabled { background:#555; color:#aaa; }
</style>
</head>
<body>

<h1>⚽ Godstime Tournament</h1>

<button id="btnRegister">Register</button>
<button id="btnAdmin">Admin</button>

<div id="registration" class="container">
<form id="regForm">
<input type="text" id="name" placeholder="Name" required>
<input type="email" id="email" placeholder="Email" required>
<select id="country">
<option>Nigeria</option>
<option>South Africa</option>
<option>Uganda</option>
<option>Tanzania</option>
<option>Kenya</option>
<option>Ghana</option>
</select>
<input type="text" id="phone" placeholder="Phone">
<select id="team">
<option>Chelsea</option>
<option>Man U</option>
<option>Man City</option>
<option>Liverpool</option>
<option>PSG</option>
<option>AC Milan</option>
<option>Real Madrid</option>
<option>Barcelona</option>
<option>Arsenal</option>
<option>Dortmund</option>
<option>Nigeria</option>
<option>South Africa</option>
<option>Uganda</option>
<option>Tanzania</option>
<option>Kenya</option>
<option>Ghana</option>
</select>
<button type="submit">Register</button>
</form>
</div>

<div id="admin" class="container">
<table>
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Email</th>
<th>Country</th>
<th>Team</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
<button id="clearBtn">Clear All</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onValue, get, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBxsPmjt2nOvfGndo519w7DUCsDmKWxm3s",
  authDomain: "gt-tournament-26529.firebaseapp.com",
  projectId: "gt-tournament-26529",
  storageBucket: "gt-tournament-26529.firebasestorage.app",
  messagingSenderId: "817158857899",
  appId: "1:817158857899:web:13b8034308d6bd130643ee"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.addEventListener('DOMContentLoaded', () => {

  const btnRegister = document.getElementById("btnRegister");
  const btnAdmin = document.getElementById("btnAdmin");
  const regForm = document.getElementById("regForm");
  const clearBtn = document.getElementById("clearBtn");

  function show(id){
    document.getElementById("registration").style.display="none";
    document.getElementById("admin").style.display="none";
    document.getElementById(id).style.display="block";
    if(id==="admin") loadAdmin();
  }

  function adminLogin(){
    let u = prompt("Username");
    let p = prompt("Password");
    if(u==="GT0021" && p==="Godstime@1"){
      show("admin");
    }else{
      alert("Wrong login");
    }
  }

  async function registerUser(e){
    e.preventDefault();
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const country = document.getElementById("country").value;
    const phone = document.getElementById("phone").value;
    const team = document.getElementById("team").value;

    // Check duplicate team
    const snapshot = await get(ref(db, "registrations"));
    let exists = false;
    snapshot.forEach(child => { if(child.val().team === team) exists = true; });
    if(exists){ alert("❌ Team already taken!"); return; }

    push(ref(db, "registrations"), { name, email, country, phone, team });
    alert("✅ Registered!");
    regForm.reset();
  }

  function loadAdmin(){
    const table = document.getElementById("table");
    onValue(ref(db, "registrations"), snapshot=>{
      table.innerHTML = "";
      let i = 1;
      snapshot.forEach(child=>{
        const r = child.val();
        table.innerHTML += `<tr><td>#${i++}</td><td>${r.name}</td><td>${r.email}</td><td>${r.country}</td><td>${r.team}</td></tr>`;
      });
    });
  }

  function clearData(){ if(confirm("Delete all registrations?")) remove(ref(db, "registrations")); }

  btnRegister.addEventListener("click", ()=>show("registration"));
  btnAdmin.addEventListener("click", adminLogin);
  regForm.addEventListener("submit", registerUser);
  clearBtn.addEventListener("click", clearData);

  show("registration");

});
</script>

</body>
</html>
